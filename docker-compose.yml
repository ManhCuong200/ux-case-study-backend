services:
  db:
    image: postgres:17-alpine
    container_name: ux-case-study-db
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    ports:
      - '5433:5432'

  backend:
    build: .
    container_name: ux-case-study-backend
    ports:
      - '3000:3000'
    depends_on:
      - db
